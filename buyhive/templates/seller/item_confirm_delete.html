{% extends 'base.html' %}
{% block content %}
  <div class="mx-auto" style="max-width: 720px;">
    <h1 class="bh-page-title h3 mb-3">Delete item</h1>

    <div class="bh-surface p-4">
      <p class="mb-3">Are you sure you want to delete <strong>{{ item.name }}</strong>?</p>
      <form method="post" class="d-flex flex-wrap gap-2">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger">Delete</button>
        <a class="btn btn-outline-secondary" href="{% url 'seller_items' %}">Cancel</a>
      </form>
    </div>
  </div>
{% endblock %}
