<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Items</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
  <div class="container py-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
      <h2 class="m-0">My Items</h2>
      <div class="d-flex gap-2">
        <a class="btn btn-primary" href="{% url 'seller_item_create' %}">Add Item</a>
        <a class="btn btn-outline-secondary" href="{% url 'dashboard' %}">Dashboard</a>
        <a class="btn btn-outline-danger" href="{% url 'logout' %}">Logout</a>
      </div>
    </div>

    {% if messages %}
      {% for message in messages %}
        <div class="alert alert-{{ message.tags }}">{{ message }}</div>
      {% endfor %}
    {% endif %}

    {% if items %}
      <div class="table-responsive">
        <table class="table table-striped align-middle">
          <thead>
            <tr>
              <th>Name</th>
              <th>Price</th>
              <th class="text-end">Actions</th>
            </tr>
          </thead>
          <tbody>
            {% for item in items %}
              <tr>
                <td>{{ item.name }}</td>
                <td>${{ item.price }}</td>
                <td class="text-end">
                  <a class="btn btn-sm btn-outline-primary" href="{% url 'seller_item_update' item.pk %}">Edit</a>
                  <a class="btn btn-sm btn-outline-danger" href="{% url 'seller_item_delete' item.pk %}">Delete</a>
                </td>
              </tr>
            {% endfor %}
          </tbody>
        </table>
      </div>
    {% else %}
      <div class="alert alert-info">No items yet.</div>
    {% endif %}
  </div>
</body>
</html>
