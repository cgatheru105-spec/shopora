{% extends 'base.html' %}

{% block title %}Staff Dashboard · EcoMart Shopora{% endblock %}

{% block content %}
  <div class="d-flex align-items-end justify-content-between flex-wrap gap-2 mb-3">
    <h1 class="bh-page-title h3 mb-0">Staff Dashboard</h1>
    <a class="btn btn-outline-secondary btn-sm" href="{% url 'items_public' %}">Browse items</a>
  </div>

  <div class="bh-surface p-4">
    <p class="text-muted mb-3">Use Django admin for full control.</p>
    <div class="d-grid gap-2 d-sm-flex flex-wrap">
      <a class="btn btn-success" href="/admin/">Open Admin</a>
      <a class="btn btn-outline-secondary" href="{% url 'profile_edit' %}">Edit Profile</a>
      <a class="btn btn-outline-danger" href="{% url 'logout' %}">Logout</a>
    </div>
  </div>
{% endblock %}
