{%load static%}
<!DOCTYPE html>
<html>
<head>
<title>Buy Products</title>

<!-- Bootstrap CSS -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

<link rel="stylesheet" href="{% static 'css/base.css' %}">
</head>

<body>

<nav class="navbar">
<h2>EcoMart Products</h2>
<a href="{%url 'index'%}">Home</a>
</nav>

<section class="products">

{% if items %}
  {% for item in items %}
  <div class="card">
    <h3>{{ item.name }}</h3>
    <p>{{ item.description|default:"" }}</p>
    <p><strong>${{ item.price }}</strong></p>
    <button type="button" class="btn btn-success" onclick="buyProduct('{{ item.name|escapejs }}')">Buy</button>
  </div>
  {% endfor %}
{% else %}
  <p class="p-3">No items yet. If you are a seller, add items from your dashboard.</p>
{% endif %}

</section>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>

<script src="{% static 'js/script.js'%}"></script>

</body>
</html>
